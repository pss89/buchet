<!-- 
    display 수정 : float 속성이 추가된 요소는 display 속성의 값이 대부분 block으로 수정됨 (float 설정하면 굳이 display :block 안해도 됨)
    clear : float 속성이 적용되지 않도록 지정(해제)
 -->

 <!-- 
     position : 요소의 위치 지정 방법의 유형(기준)을 설정
     - static : 유형(기준) 없음 / 배치 불가능 (default)
     - relative : 요소 자신의 기준으로 배치
     - absolute : 위치 상 부모요소의 기준으로 배치 (top,left,bottom,right 등의 속성값과 같이 사용), 상황에 따라 부모요소가 아닌 조상요소의 기준으로 배치도 가능하다
     - fixed : 브라우저(뷰포트)를 기준으로 배치
     - sticky : 스크롤 영역 기준으로 배치
     - top,bottom,left,right : 요서의 position 기준에 맞는 속성값의 거리(위치)를 설정
     -- auto : 브라우저가 계산
     -- 단위 : px,em,cm 등 단위로 지정
     -- % : 부모(위치상의 부모(조상)) 요소의 세로(top,bottom) , 가로(left,right) 너비의 비율로 지정, 음수 값 허용
     -- 특징 : 
     1. 요소 쌓임 순서 : 요소가 쌓여 있는 순서를 통해 어떤 요소가 사용자와 가깝게 있는지(더 위에 쌓이는지)를 결정(z축)
     2. display 수정 : absolute, fixed 속성 값이 적용 된 요소는 display 속성의 값이 대부분 block으로 수정됨
  -->

  <!-- 
    background : 요소의 배경을 설정
    - 색상, 경로, 반복여부, 위치, 스크롤특성
    -- background-color : 요소의 배경 색상을 지정
    -- background-image : 요소의 배경에 하나 이상의 이미지를 삽입
    -- background-repeat : 요소의 배경을 반복적으로 보여줄지 여부 설정
    -- background-position : 배경 이미지의 위치를 설정
    -- background-attachment : 요소가 스크롤될 때 배경 이미지의 스크롤 여부(특성) 설정
    -- background-size : 배경 이미지의 크기를 지정
   -->

   <!-- 
     transitions : css속성의 전환 효과를 지정
     -- transitions-property : 전환 효과를 사용 할 속성 이름
     -- transitions-duration : 전환 효과의 지속시간 설정
     -- transitions-timing-function : 타이밍 함수 지정
     -- transitions-delay : 전환 효과의 대기시간 설정

     transform : 요소의 변환 효과(변형)를 지정
     -- transform-origin : 요소 변환의 기준점을 설정
     -- transform-style : 3D변환 요소의 자식 요소도 3D 변환을 사용할지 설정
     -- perspective : 하위 요소를 관찰하는 원근 거리를 설정
     -- perspective-origin : 원근 거리의 기준점을 설정
     -- backface-visibility : 3D 변환으로 회전된 요소의 뒷면 숨김을 설정
    -->
