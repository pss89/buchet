<!-- 현재 html 5버전으로 알아서 적용 됨 -->
<!DOCTYPE html>
<html lang="en">

<!-- 해당 페이지의 정보 -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="박성식">
    <meta name="description" content="박성식 사이트">
    <meta http-equiv="X-UA-Compatible" content="id=edge">
    <title>Document</title>
</head>
<!-- 해당 페이지의 구조 -->
<body>
    <div>
        <h1>안녕하세요!</h1>
        <!-- 
        1. jpg(jpeg) : 손실 압축, 24비트(1600만 색상) , 해당 확장자로 계속 편집 할 경우 계속 손실 됨, 높은 압축률(적은 용량!)
        2. png : 비손실 압축, 8비트(256 색상) / 24비트(약 1600만 색상), 투명도 지원, W3C 권장 포맷(웹 표준을 정하는 기구)
        3. gif : 비손실 압축, 여라장의 이미지를 한개의 파일에 담는다(움짤), 8비트(256 색상), 동영상 같은 이미지
        4. webp : jpg, png, gif 모두 대체할 수 있는 구글이 개발한 이미지 포맷, 완벽한 손실/비손실 압축 지원, 
        img 태그와 같이 끝내는 태그가 없는 경우를 빈태그라 한다.
        -->


    </div>
</body>

</html>
