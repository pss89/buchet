    <!-- 
        1. jpg(jpeg) : 손실 압축, 24비트(1600만 색상) , 해당 확장자로 계속 편집 할 경우 계속 손실 됨, 높은 압축률(적은 용량!)
        2. png : 비손실 압축, 8비트(256 색상) / 24비트(약 1600만 색상), 투명도 지원, W3C 권장 포맷(웹 표준을 정하는 기구)
        3. gif : 비손실 압축, 여라장의 이미지를 한개의 파일에 담는다(움짤), 8비트(256 색상), 동영상 같은 이미지
        4. webp : jpg, png, gif 모두 대체할 수 있는 구글이 개발한 이미지 포맷, 완벽한 손실/비손실 압축 지원, gif같은 에니메이션 지원, 투명도 지원(손실,비손실 모두), 완벽한 포맷이지만 지원 브라우저가 약점
        5. svg : 백터 기반, 해상도의 영향에서 자유로움, css로 스타일링 가능, javascript로 event handling 가능 , 백터 이미지에 익숙하지 않다면 다루기 조금 까다로움
        6. img ,link 태그와 같이 끝내는 태그가 없는 경우를 빈태그라 한다.
        -->
