    <!-- 
        CSS 적용방식 
        - inline : html 태그에 style 전역속성에 속성값을 적용하는 방식
        - link : <link rel="stylesheet" href="링크"> 외부에서 css 파일 가져오기 (병렬방식)
        - @import : @import url(링크) css파일에서 외부 css파일을 로드한다 (직렬방식)
    -->
    
    <!-- 
        CSS 선택자
        전체선택자 : * ex) * {~~}
        태그선택자 : li , div 등 ex) li {~~}
        클래스선택자 : .클래스명 ex) .dd {~~}
        아이디선택자 : #아이디명 ex) #dd {~~}
        일치선택자 : EF를 동시에 만족하는 선택자 ex) span.orange
        자식선택자 : E > F ex) dev > .orange
        후손(하위) 선택자 : E F ex) div .orange
        인접 형제 선택자 : E + F ex) .dd + li {~~} - 다음 형제(태그)를 찾는다
        일반 형제 선택자 : E ~ F ex) .dd ~ li {~~} - 다음 형제(태그)를 찾는다
        가상 클래스 선택자 : 
        ex) a:hover - 선택자 위에 마우스를 오버 하였을 때 
        ex) a:active - 마우스로 클릭하는 동안에만 선택(왼쪽 클릭 때면 없어짐)
        ex) E:focus - 포커스 된 동안에만 선택 (대화형 태그에만 - input text, textarea 등)
        ex) E:first-child or last-child - 형제 요소 중 첫번째 요소라면 선택
        ex) E:nth-child(n or 2n(곱하기) or n+3) - 형제요소 중 n번째 요소라면 선택 (n키워드 사용 시 0부태 해석(Zero-base))
        ex) E:nth-of-type(n) - 타입(태그이름 ex)div, p 등 클래스,아이디는 안됨) 과 동일한 타입인 형제 요소중 E가 n번째 요소라면 선택(n키워드 사용시 0부터 해석(Zero-base))
        ex) E:not(s) - s가 아닌 E선택 (부정선택자 라고도 함) ex) E:not(선택자 (클래스명, 아이디 등) )
        
        ul>li tab 클릭하면 자동 완성 ex)ul>li{5$}*20

        가상 요소 선택자 :
        BEFORE - E요소 내부의 내용 앞에 내용(content)을 삽입(content속성은 무조건 사용해야 함) ex)E::before , <div><p>이거임!얍</p></div>
        AFTER - E요소 내부의 뒤에 내용을 삽입 ex) E::after, <div><p>얍이거임!</p></div>

        속성 선택자 : 
        attr - 속성 attr을 포함한 요소 선택 ex) [attr]
        attr=value - 속성 attr을 포함하며 속성값이 value인 요소 선택 ex) [attr=value]
        attr^=value - 속성 attr을 포함하며 속성값이 value로 시작하는 요소 선택 ex) [attr^=value]
        attr$=value - 속성 attr을 포함하며 속성값이 value로 끝나는 요소 선택 ex) [attr$=value]
     -->

        글자를 다루는 속성들은 대부분 상속 : inherit
        가장중요 : !important (점수 : 무한대)
        인라인태그 : (점수 : 1000) - 유지보수 힘듬
        아이디 선택자 : (점수 : 100)
        클래스 선택자 : (점수 : 10)
        태그 선택자 : (점수 : 1)
        전체선택자 : (점수 : 0) ex) * {속성값}
        상속 : (점수 : 계산하지 않음)
    -->

    <!-- 
        box-sizing:요소의 크기 계산 기준을 지정
            - content-box : 너비(width, height) 만으로 요소의 크기를 계산
            - border-box : 너비(width,height)에 안쪽여백(padding) 과 테두리 선(border)를 포함하여 요소의 크기를 계산
        display: 요소의 박스타입(유형)을 설정
            - block : 블록요소(div 등)
            - inline : 인라인요소(span 등)
            - inline-block : 인라인-블록요소(input 등)
            - 기타 : table, table-cell, flex 등
            - none : 요소의 박스 타입이 없음(요소가 사라짐)
    -->

    <!-- 
        overflow : 요소의 크기 이상으로 내용(자식요소)이 넘쳤을 때, 내용의 보여짐을 제어(단축)
        opacity: 요소의 투명도를 설정
     -->

     <!-- 
         font-style : 글자 기울기 지정
         font-weight : 글자 두께 지정
         font-size : 글자 크기 지정
         line-height : 줄 높이(줄간격) 지정 (reset.css 적용 시 1)
         font-family : 글꼴(서체) 지정 - 운영체제(브라우저)에 따라 달라짐
      -->
